name: Email verification format

on:
  pull_request:

permissions:
  contents: write

jobs:
  prettier:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: >-
          npx prettier --write
          package.json
          src/core/email/email.service.js
          src/modules/auth/auth.controller.js
          src/modules/auth/auth.repository.js
          src/modules/auth/auth.routes.js
          src/modules/auth/auth.schemas.js
          src/modules/auth/auth.service.js
          src/views/auth/login.ejs
          src/views/auth/verify-email-pending.ejs
          src/views/auth/verify-email-result.ejs
          tests/email-verification.integration.test.js
          tests/http/authentication.http.test.js
      - name: Commit formatted files
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json src tests
          git commit -m "style: aplicar formato a verificacion de correo"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

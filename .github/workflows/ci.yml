name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: mendo_finanzas_dev
          POSTGRES_USER: mendo_dev
          POSTGRES_PASSWORD: mendo_dev_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mendo_dev -d mendo_finanzas_dev"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      NODE_ENV: test
      PORT: 3000
      APP_URL: http://127.0.0.1:3000
      DATABASE_URL: postgresql://mendo_dev:mendo_dev_ci@127.0.0.1:5432/mendo_finanzas_dev?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Format source files
        run: npm run format

      - name: Commit formatting changes
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No formatting changes were necessary."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "style: apply Prettier formatting"
          git push origin "HEAD:${{ github.head_ref }}"

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Validate Prisma schema
        run: npm run prisma:validate

      - name: Apply database migrations
        run: npm run prisma:deploy

      - name: Load development seed
        run: npm run db:seed

      - name: Check formatting
        run: npm run format:check

      - name: Run ESLint
        run: npm run lint

      - name: Smoke test application
        shell: bash
        run: |
          npm start > app.log 2>&1 &
          app_pid=$!
          trap 'kill "$app_pid" 2>/dev/null || true; cat app.log' EXIT

          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3000/health > health.json; then
              break
            fi
            sleep 1
          done

          grep -q '"status":"ok"' health.json
          grep -q '"database":"up"' health.json
          curl --fail --silent http://127.0.0.1:3000/ | grep -q 'Mendo Finanzas'

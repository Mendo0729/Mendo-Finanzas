name: Mantener SharedWallet activo

on:
  schedule:
    # Cada 10 minutos
    - cron: '7,17,27,37,47,57 * * * *'

  # Permite ejecutarlo manualmente desde GitHub
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: keep-sharedwallet-awake
  cancel-in-progress: true

jobs:
  ping:
    name: Consultar SharedWallet
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Verificar sitio web
        env:
          APP_URL: ${{ secrets.SHAREDWALLET_UP }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${APP_URL:-}" ]; then
            echo "ERROR: El secreto SHAREDWALLET_UP no está configurado."
            exit 1
          fi

          echo "Consultando SharedWallet..."

          HTTP_STATUS="$(
            curl \
              --location \
              --silent \
              --show-error \
              --output /dev/null \
              --write-out "%{http_code}" \
              --connect-timeout 20 \
              --max-time 90 \
              --retry 2 \
              --retry-delay 5 \
              "$APP_URL"
          )"

          echo "Código HTTP recibido: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 400 ]; then
            echo "SharedWallet respondió correctamente."
          else
            echo "ERROR: SharedWallet devolvió HTTP $HTTP_STATUS."
            exit 1
          fi

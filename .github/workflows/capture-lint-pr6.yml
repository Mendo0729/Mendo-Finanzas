name: Capture PR 6 lint

on:
  pull_request:

permissions:
  contents: write

jobs:
  capture:
    if: github.event.pull_request.head.ref == 'feat/accounts-and-categories'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Capture ESLint output
        shell: bash
        run: |
          npm run lint > eslint-pr6.txt 2>&1 || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add eslint-pr6.txt
          git commit -m "chore: capture eslint output" || exit 0
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"

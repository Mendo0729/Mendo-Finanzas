name: Budget format diagnostics

on:
  pull_request:
    branches: [main]

jobs:
  format-diagnostics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Capture formatting output
        shell: bash
        run: npm run format:check > budget-format.log 2>&1 || true
      - name: Upload formatting output
        uses: actions/upload-artifact@v4
        with:
          name: budget-format-diagnostics
          path: budget-format.log

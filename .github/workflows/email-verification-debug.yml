name: Email verification debug

on:
  pull_request:

permissions:
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: mendo_finanzas_dev
          POSTGRES_USER: mendo_dev
          POSTGRES_PASSWORD: mendo_dev_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mendo_dev -d mendo_finanzas_dev"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      NODE_ENV: test
      PORT: 3000
      APP_URL: http://127.0.0.1:3000
      DATABASE_URL: postgresql://mendo_dev:mendo_dev_ci@127.0.0.1:5432/mendo_finanzas_dev?schema=public
      SESSION_SECRET: ci_only_session_secret_with_at_least_32_characters
      MFA_ENCRYPTION_KEY: MDEyMzQ1Njc4OUFCQ0RFRjAxMjM0NTY3ODlBQkNERUY=
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run prisma:deploy
      - name: Run isolated email verification test
        run: node --test --test-concurrency=1 tests/email-verification.integration.test.js > email-test.log 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: email-verification-debug-log
          path: email-test.log

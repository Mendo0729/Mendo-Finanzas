name: Verified HTTP fixtures

on:
  pull_request:

permissions:
  contents: write

jobs:
  update-fixtures:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Mark direct HTTP fixture users as verified
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          paths = [
              Path('tests/http/household-context.http.test.js'),
              Path('tests/http/transactions.http.test.js'),
              Path('tests/http/budgets.http.test.js'),
          ]
          pattern = re.compile(r'(?P<indent>\s*)passwordHash,\n(?P=indent)status: 1,')
          for path in paths:
              content = path.read_text(encoding='utf-8')
              updated, count = pattern.subn(
                  lambda match: (
                      f"{match.group('indent')}passwordHash,\n"
                      f"{match.group('indent')}status: 1,\n"
                      f"{match.group('indent')}emailVerifiedAt: new Date(),"
                  ),
                  content,
              )
              if count == 0:
                  raise SystemExit(f'No se encontraron fixtures de usuario en {path}')
              path.write_text(updated, encoding='utf-8')
              print(f'{path}: {count} usuarios marcados como verificados')
          PY
      - name: Format fixtures
        run: npx prettier --write tests/http/household-context.http.test.js tests/http/transactions.http.test.js tests/http/budgets.http.test.js
      - name: Commit fixture changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/http/household-context.http.test.js tests/http/transactions.http.test.js tests/http/budgets.http.test.js
          git commit -m "test(http): marcar fixtures directos como verificados"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

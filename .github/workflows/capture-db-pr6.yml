name: Capture PR 6 database tests

on:
  pull_request:

permissions:
  contents: write

jobs:
  capture:
    if: github.event.pull_request.head.ref == 'feat/accounts-and-categories'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: mendo_finanzas_dev
          POSTGRES_USER: mendo_dev
          POSTGRES_PASSWORD: mendo_dev_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mendo_dev -d mendo_finanzas_dev"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://mendo_dev:mendo_dev_ci@localhost:5432/mendo_finanzas_dev?schema=public
      SESSION_SECRET: ci_session_secret_with_at_least_32_characters
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run prisma:deploy
      - run: npm run db:seed
      - name: Capture database output
        shell: bash
        run: |
          npm run test:db > db-pr6.txt 2>&1 || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add db-pr6.txt
          git commit -m "chore: capture database test output" || exit 0
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"

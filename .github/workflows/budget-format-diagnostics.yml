name: Budget format diagnostics

on:
  pull_request:
    branches: [main]

jobs:
  format-diagnostics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Format selected files
        run: >-
          npx prettier --write
          src/modules/budgets/budget.controller.js
          src/modules/budgets/budget.service.js
          tests/budgets.integration.test.js
      - name: Upload formatted files
        uses: actions/upload-artifact@v4
        with:
          name: budget-formatted-files
          path: |
            src/modules/budgets/budget.controller.js
            src/modules/budgets/budget.service.js
            tests/budgets.integration.test.js

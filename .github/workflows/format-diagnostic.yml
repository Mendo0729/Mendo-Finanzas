name: Format diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  prettier:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: >-
          npx prettier --write
          src/config/env.js
          src/core/middleware/rate-limit.js
          tests/http/application.http.test.js
      - uses: actions/upload-artifact@v4
        with:
          name: formatted-files
          path: |
            src/config/env.js
            src/core/middleware/rate-limit.js
            tests/http/application.http.test.js

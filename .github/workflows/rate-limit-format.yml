name: Rate limit format

on:
  pull_request:

permissions:
  contents: read

jobs:
  prettier:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: >-
          npx prettier --write
          package.json
          src/core/middleware/rate-limit.js
          src/core/security/postgres-rate-limit-store.js
          src/modules/auth/auth.routes.js
          src/modules/security/security.routes.js
          tests/http/authentication.http.test.js
          tests/rate-limit.integration.test.js
          tests/unit/rate-limit.middleware.test.js
      - uses: actions/upload-artifact@v4
        with:
          name: rate-limit-formatted-files
          path: |
            package.json
            src/core/middleware/rate-limit.js
            src/core/security/postgres-rate-limit-store.js
            src/modules/auth/auth.routes.js
            src/modules/security/security.routes.js
            tests/http/authentication.http.test.js
            tests/rate-limit.integration.test.js
            tests/unit/rate-limit.middleware.test.js
